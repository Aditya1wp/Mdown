<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e293b" />
    <meta name="description" content="Movie Downloader App" />
    <link rel="apple-touch-icon" href="/pwa-192x192.svg" />
    <title>StreamVault</title>
    <!-- Google Translate Widget -->
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({pageLanguage: 'en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <style>
      /* Hide the default Google Translate bar if it appears */
      .goog-te-banner-frame.skiptranslate, .goog-te-gadget-icon { display: none !important; }
      body { top: 0px !important; }
      .goog-te-gadget-simple {
        background-color: #334155 !important;
        border: 1px solid #475569 !important;
        padding: 4px 8px !important;
        border-radius: 8px !important;
        color: white !important;
        font-family: inherit !important;
        font-size: 14px !important;
      }
      .goog-te-gadget-simple span { color: #e2e8f0 !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Hidden element for Google Translate to hook into -->
    <div id="google_translate_element" style="position: absolute; top: -1000px; left: -1000px;"></div>
    <script type="module" src="/src/main.jsx"></script>

  </body>
</html>
